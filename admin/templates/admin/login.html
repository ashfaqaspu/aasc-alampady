<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AASC Admin Login</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #0d47a1, #1565c0, #1e88e5);
            overflow: hidden;
        }

        /* Background glow effect */
        body::before {
            content: "";
            position: absolute;
            width: 500px;
            height: 500px;
            background: rgba(255,255,255,0.08);
            border-radius: 50%;
            top: -150px;
            right: -150px;
        }

        .container {
            width: 100%;
            max-width: 420px;
            padding: 20px;
            position: relative;
            z-index: 2;
        }

        .login-box {
            background: rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(18px);
            border-radius: 20px;
            padding: 40px 35px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.25);
            border: 1px solid rgba(255,255,255,0.2);
            animation: fadeIn 0.8s ease;
        }

        h2 {
            text-align: center;
            color: #ffffff;
            font-weight: 600;
            margin-bottom: 30px;
            letter-spacing: 1px;
        }

        .input-group {
            margin-bottom: 20px;
        }

        input {
            width: 100%;
            padding: 14px 16px;
            border-radius: 10px;
            border: none;
            outline: none;
            font-size: 14px;
            font-family: inherit;
            background: rgba(255,255,255,0.15);
            color: #fff;
            transition: 0.3s;
        }

        input::placeholder {
            color: rgba(255,255,255,0.7);
        }

        input:focus {
            background: rgba(255,255,255,0.25);
            box-shadow: 0 0 0 2px rgba(255,255,255,0.3);
        }

        button {
            width: 100%;
            padding: 14px;
            border-radius: 12px;
            border: none;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            background: #ffffff;
            color: #0d47a1;
            margin-top: 10px;
        }

        button:hover {
            background: #e3f2fd;
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.25);
        }

        .error {
            background: rgba(255, 0, 0, 0.15);
            color: #ffdddd;
            padding: 10px;
            border-radius: 8px;
            text-align: center;
            margin-bottom: 15px;
            font-size: 13px;
        }

        .back-btn {
            display: inline-block;
            text-decoration: none;
            text-align: center;
            margin-bottom: 20px;
            padding: 10px 16px;
            border-radius: 30px;
            font-size: 13px;
            font-weight: 500;
            background: rgba(255,255,255,0.2);
            color: #fff;
            transition: 0.3s;
        }

        .back-btn:hover {
            background: rgba(255,255,255,0.35);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 480px) {
            .login-box {
                padding: 30px 20px;
            }
        }
    </style>
</head>
<body>

<div class="container">
    
    <a href="{{ url_for('website.home') }}" class="back-btn">
        🌐 Go to Public Website
    </a>

    <div class="login-box">
        <h2>Admin Login</h2>

        {% if error %}
        <div class="error">{{ error }}</div>
        {% endif %}

        <form method="post">
            <div class="input-group">
                <input name="username" placeholder="Username" required>
            </div>

            <div class="input-group">
                <input name="password" type="password" placeholder="Password" required>
            </div>

            <button type="submit">Login</button>
        </form>
    </div>
</div>

</body>
</html>
