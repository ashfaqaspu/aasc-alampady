<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AASC Admin Dashboard</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Professional Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            min-height: 100vh;
            padding: 50px 40px;
            background: linear-gradient(135deg, #0d47a1, #1565c0, #1e88e5);
            color: #fff;
        }

        h2 {
            font-weight: 600;
            font-size: 28px;
            margin-bottom: 40px;
            letter-spacing: 1px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 25px;
        }

        .card {
            background: rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(16px);
            padding: 28px;
            border-radius: 18px;
            border: 1px solid rgba(255,255,255,0.2);
            box-shadow: 0 15px 40px rgba(0,0,0,0.25);
            transition: 0.3s ease;
        }

        .card:hover {
            transform: translateY(-8px);
            box-shadow: 0 25px 50px rgba(0,0,0,0.35);
        }

        .card h3 {
            font-size: 18px;
            font-weight: 500;
            margin-bottom: 15px;
            letter-spacing: 0.5px;
        }

        .card p {
            font-size: 26px;
            font-weight: 700;
            margin-bottom: 20px;
        }

        .card p b {
            font-weight: 700;
        }

        .links a {
            display: inline-block;
            padding: 10px 18px;
            border-radius: 30px;
            text-decoration: none;
            font-size: 13px;
            font-weight: 600;
            background: #ffffff;
            color: #0d47a1;
            transition: 0.3s;
        }

        .links a:hover {
            background: #e3f2fd;
            transform: scale(1.05);
        }

        .logout {
            margin-top: 40px;
            display: inline-block;
            padding: 12px 22px;
            border-radius: 30px;
            background: #ffffff;
            color: #c62828;
            font-weight: 600;
            text-decoration: none;
            transition: 0.3s;
        }

        .logout:hover {
            background: #ffebee;
            transform: translateY(-3px);
        }

        /* Responsive */
        @media (max-width: 768px) {
            body {
                padding: 30px 20px;
            }

            h2 {
                font-size: 22px;
                margin-bottom: 30px;
            }
        }
    </style>
</head>
<body>

<h2>Admin Dashboard</h2>

<div class="grid">

    <div class="card">
        <h3>📅 Events</h3>
        <p>Total: <b>{{ event_count }}</b></p>
        <div class="links">
            <a href="/admin/events">Manage Events</a>
        </div>
    </div>

    <div class="card">
        <h3>⚽ Sports</h3>
        <p>Total: <b>{{ sports_count }}</b></p>
        <div class="links">
            <a href="/admin/sports">Manage Sports</a>
        </div>
    </div>

    <div class="card">
        <h3>❤️ Charity</h3>
        <p>Total: <b>{{ charity_count }}</b></p>
        <div class="links">
            <a href="/admin/charity">Manage Charity</a>
        </div>
    </div>

    <div class="card">
        <h3>🏆 Awards</h3>
        <p>Total: <b>{{ award_count }}</b></p>
        <div class="links">
            <a href="/admin/awards">Manage Awards</a>
        </div>
    </div>

</div>

<a class="logout" href="/admin/logout">🚪 Logout</a>

</body>
</html>
