{% extends "portal_base.html" %}
{% block content %}

<style>
.create-wrapper {
  padding: 50px 20px;
  display: flex;
  justify-content: center;
}

/* Card */
.card {
  background: #ffffff;
  width: 100%;
  max-width: 560px;
  padding: 45px 40px;
  border-radius: 24px;
  box-shadow: 0 35px 80px rgba(15, 23, 42, 0.12);
  border: 1px solid #eef2f7;
  position: relative;
  overflow: hidden;
}

/* Subtle top accent */
.card::before {
  content: "";
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 6px;
  background: linear-gradient(90deg, #2563eb, #6366f1);
}

/* Title */
h2 {
  margin-top: 0;
  margin-bottom: 35px;
  text-align: center;
  font-size: 28px;
  font-weight: 700;
  color: #1e293b;
  letter-spacing: 0.3px;
}

/* Labels */
label {
  display: block;
  font-size: 13px;
  font-weight: 600;
  color: #64748b;
  margin-bottom: 8px;
}

/* Inputs */
input {
  width: 100%;
  padding: 14px 16px;
  border-radius: 14px;
  border: 1px solid #e2e8f0;
  background: #f8fafc;
  font-size: 14px;
  margin-bottom: 22px;
  transition: all 0.25s ease;
}

input:focus {
  outline: none;
  border-color: #6366f1;
  background: #ffffff;
  box-shadow: 0 0 0 4px rgba(99,102,241,0.15);
}

/* Time Grid */
.time-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
}

/* Button */
button {
  width: 100%;
  padding: 16px;
  background: linear-gradient(135deg, #2563eb, #4f46e5);
  color: #ffffff;
  border: none;
  border-radius: 18px;
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.25s ease;
  box-shadow: 0 20px 40px rgba(37,99,235,0.25);
  margin-top: 10px;
}

button:hover {
  transform: translateY(-3px);
  box-shadow: 0 30px 60px rgba(37,99,235,0.35);
}

button:active {
  transform: scale(0.97);
}

/* Hint Box */
.hint {
  margin-top: 18px;
  font-size: 13px;
  color: #64748b;
  text-align: center;
  padding: 12px 15px;
  background: #f1f5ff;
  border-radius: 12px;
}

/* Back Link */
.back {
  display: block;
  text-align: center;
  margin-top: 28px;
  font-weight: 600;
  text-decoration: none;
  color: #475569;
  font-size: 14px;
  transition: 0.2s;
}

.back:hover {
  color: #1e293b;
}

/* Responsive */
@media (max-width: 500px) {
  .card {
    padding: 35px 25px;
  }

  .time-row {
    grid-template-columns: 1fr;
  }
}

/* Print */
@media print {
  body {
    background: white;
  }

  .card {
    box-shadow: none;
    border: none;
  }

  .back {
    display: none;
  }
}
</style>

<div class="create-wrapper">
  <div class="card">

    <h2>📅 Create Committee Meeting</h2>

    <form method="POST" onsubmit="return validateTime()">

      <label>Meeting Title</label>
      <input type="text" name="title" required>

      <label>Meeting Date</label>
      <input type="date" name="meeting_date" required>

      <div class="time-row">
        <div>
          <label>Start Time</label>
          <input type="time" name="start_time" id="start_time" required>
        </div>

        <div>
          <label>End Time</label>
          <input type="time" name="end_time" id="end_time" required>
        </div>
      </div>

      <button type="submit">
        🚀 Create & Generate QR
      </button>

      <div class="hint">
        📌 A QR code will be generated automatically for attendance tracking.
      </div>

    </form>

    <a href="{{ url_for('portal.committee_dashboard', cid=cid) }}"
       class="back">
      ← Back to Committee Dashboard
    </a>

  </div>
</div>

<script>
function validateTime() {
  const start = document.getElementById("start_time").value;
  const end = document.getElementById("end_time").value;

  if (start && end && end <= start) {
    alert("End time must be greater than start time.");
    return false;
  }

  return true;
}
</script>

{% endblock %}
