<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Manage Announcements</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- Premium Font -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
* {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
    font-family: 'Inter', sans-serif;
}

body {
    min-height: 100vh;
    background: radial-gradient(circle at 20% 30%, #1e3c72, #0f2027 60%);
    padding: 60px 20px;
    color: #ffffff;
}

/* Layout */
.container {
    max-width: 1050px;
    margin: auto;
}

/* Top Bar */
.top-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 45px;
}

.top-bar h2 {
    font-size: 30px;
    font-weight: 700;
    letter-spacing: 0.6px;
}

.top-bar a {
    text-decoration: none;
    padding: 12px 20px;
    border-radius: 14px;
    font-weight: 600;
    font-size: 14px;
    background: linear-gradient(135deg,#42a5f5,#1e88e5);
    color: #ffffff;
    transition: 0.3s ease;
    box-shadow: 0 12px 30px rgba(66,165,245,0.4);
}

.top-bar a:hover {
    transform: translateY(-3px);
    box-shadow: 0 20px 45px rgba(66,165,245,0.6);
}

/* Glass Card */
.card {
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(22px);
    border-radius: 26px;
    padding: 40px;
    margin-bottom: 40px;
    border: 1px solid rgba(255,255,255,0.15);
    box-shadow: 0 40px 90px rgba(0,0,0,0.45);
    animation: fadeIn 0.6s ease;
}

@keyframes fadeIn {
    from { opacity:0; transform: translateY(25px);}
    to { opacity:1; transform: translateY(0);}
}

h3 {
    font-size: 20px;
    margin-bottom: 25px;
    font-weight: 600;
    letter-spacing: 0.4px;
}

/* Form */
label {
    font-size: 13px;
    font-weight: 600;
    opacity: 0.8;
    margin-bottom: 6px;
    display: block;
}

input, textarea {
    width: 100%;
    padding: 14px 16px;
    border-radius: 16px;
    border: 1px solid rgba(255,255,255,0.25);
    background: rgba(255,255,255,0.9);
    color: #222;
    font-size: 14px;
    margin-bottom: 22px;
    transition: 0.25s ease;
}

input:focus, textarea:focus {
    outline: none;
    box-shadow: 0 0 0 3px rgba(66,165,245,0.4);
}

textarea {
    resize: vertical;
}

/* Publish Button */
button {
    padding: 16px 28px;
    border-radius: 18px;
    border: none;
    font-weight: 600;
    font-size: 15px;
    background: linear-gradient(135deg,#00c6ff,#0072ff);
    color: #ffffff;
    cursor: pointer;
    transition: 0.3s ease;
    box-shadow: 0 20px 50px rgba(0,114,255,0.4);
}

button:hover {
    transform: translateY(-4px);
    box-shadow: 0 28px 60px rgba(0,114,255,0.6);
}

/* Announcements */
.announcement {
    background: rgba(255,255,255,0.12);
    padding: 22px;
    border-radius: 20px;
    margin-bottom: 25px;
    border: 1px solid rgba(255,255,255,0.15);
    transition: 0.3s ease;
}

.announcement:hover {
    transform: translateY(-6px);
    background: rgba(255,255,255,0.18);
}

.announcement-title {
    font-size: 18px;
    font-weight: 600;
    margin-bottom: 8px;
}

.announcement p {
    margin-bottom: 12px;
    line-height: 1.6;
    opacity: 0.9;
}

.announcement-img {
    max-width: 420px;
    width: 100%;
    border-radius: 18px;
    margin-top: 12px;
    box-shadow: 0 15px 40px rgba(0,0,0,0.6);
    transition: 0.3s ease;
}

.announcement-img:hover {
    transform: scale(1.04);
}

small {
    opacity: 0.75;
    font-size: 13px;
}

/* Responsive */
@media(max-width: 650px){
    .card { padding: 28px; }
    .top-bar { flex-direction: column; gap: 15px; align-items: flex-start; }
}
</style>
</head>

<body>

<div class="container">

    <div class="top-bar">
        <h2>📢 Manage Announcements</h2>
        <a href="{{ url_for('portal.dashboard') }}">← Back to Dashboard</a>
    </div>

    <!-- ADD ANNOUNCEMENT -->
    <div class="card">
        <h3>Add New Announcement</h3>

        <form method="POST" enctype="multipart/form-data">
            <label>Title</label>
            <input type="text" name="title" placeholder="Announcement title" required>

            <label>Message</label>
            <textarea name="message" rows="4" placeholder="Announcement message" required></textarea>

            <label>Upload Image (optional)</label>
            <input type="file" name="image" accept="image/*">

            <button type="submit">Publish Announcement</button>
        </form>
    </div>

    <!-- EXISTING ANNOUNCEMENTS -->
    <div class="card">
        <h3>Published Announcements</h3>

        {% if announcements %}
            {% for a in announcements %}
                <div class="announcement">
                    <div class="announcement-title">{{ a[1] }}</div>
                    <p>{{ a[2] }}</p>

                    {% if a[3] %}
                        <img src="/{{ a[3] }}" class="announcement-img">
                    {% endif %}

                    <small>📅 {{ a[4] }}</small>
                </div>
            {% endfor %}
        {% else %}
            <p style="opacity:0.7;">No announcements published yet.</p>
        {% endif %}
    </div>

</div>

</body>
</html>
