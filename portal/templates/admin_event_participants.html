<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Event Participants</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
* {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
    font-family: 'Inter', sans-serif;
}

body {
    min-height: 100vh;
    padding: 60px 20px;
    background: linear-gradient(135deg, #0f172a, #1e293b);
    color: #f1f5f9;
}

/* Page Title */
.page-title {
    text-align: center;
    font-size: 26px;
    font-weight: 600;
    margin-bottom: 35px;
    letter-spacing: 0.4px;
}

/* Table Card */
.table-wrapper {
    max-width: 1000px;
    margin: auto;
    background: #1e293b;
    border-radius: 22px;
    border: 1px solid #334155;
    overflow: hidden;
    box-shadow: 0 30px 70px rgba(0,0,0,0.5);
}

/* Table */
table {
    width: 100%;
    border-collapse: collapse;
}

/* Header */
thead {
    background: linear-gradient(135deg, #6366f1, #4338ca);
}

th {
    padding: 16px 20px;
    text-align: left;
    font-size: 14px;
    font-weight: 600;
    color: white;
    letter-spacing: 0.3px;
}

/* Body */
td {
    padding: 16px 20px;
    border-bottom: 1px solid #334155;
    font-size: 14px;
    color: #e2e8f0;
}

tr:last-child td {
    border-bottom: none;
}

/* Row Hover */
tbody tr {
    transition: 0.25s ease;
}

tbody tr:hover {
    background: #0f172a;
}

/* Empty Row */
.empty {
    text-align: center;
    padding: 30px;
    color: #94a3b8;
    font-style: italic;
}

/* Back Button */
.back-btn {
    display: inline-block;
    margin: 35px auto 0;
    padding: 12px 22px;
    border-radius: 14px;
    text-decoration: none;
    font-weight: 600;
    background: #334155;
    color: #f1f5f9;
    transition: 0.3s ease;
    text-align: center;
}

.back-container {
    text-align: center;
}

.back-btn:hover {
    background: #475569;
    transform: translateY(-3px);
}

/* Responsive */
@media (max-width: 768px) {
    th, td {
        padding: 12px;
        font-size: 13px;
    }
}
</style>
</head>

<body>

<div class="page-title">
    👥 Participants – {{ event[0] }}
</div>

<div class="table-wrapper">
    <table>
        <thead>
            <tr>
                <th>#</th>
                <th>Name</th>
                <th>Phone</th>
                <th>Membership ID</th>
            </tr>
        </thead>
        <tbody>
            {% for p in participants %}
            <tr>
                <td>{{ loop.index }}</td>
                <td>{{ p[0] }}</td>
                <td>{{ p[1] }}</td>
                <td>{{ p[2] }}</td>
            </tr>
            {% else %}
            <tr>
                <td colspan="4" class="empty">No participants yet</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>

<div class="back-container">
    <a href="{{ url_for('portal.admin_events') }}" class="back-btn">
        ← Back
    </a>
</div>

</body>
</html>
