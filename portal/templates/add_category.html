<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Add Equipment Category</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Professional Font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
            background: linear-gradient(135deg, #141e30, #243b55);
        }

        .category-card {
            width: 100%;
            max-width: 650px;
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(18px);
            border-radius: 22px;
            padding: 50px 45px;
            border: 1px solid rgba(255,255,255,0.15);
            box-shadow: 0 30px 70px rgba(0,0,0,0.4);
            animation: fadeIn 0.6s ease;
        }

        .category-title {
            text-align: center;
            font-size: 26px;
            font-weight: 700;
            color: #ffffff;
            margin-bottom: 40px;
            letter-spacing: 0.4px;
        }

        .form-group {
            position: relative;
            margin-bottom: 30px;
        }

        .form-control {
            width: 100%;
            padding: 16px 15px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.25);
            background: rgba(255,255,255,0.05);
            font-size: 14.5px;
            color: #ffffff;
            outline: none;
            transition: 0.3s ease;
        }

        .form-control::placeholder {
            color: transparent;
        }

        .form-control:focus {
            border-color: #42a5f5;
            box-shadow: 0 0 0 3px rgba(66,165,245,0.25);
            background: rgba(255,255,255,0.1);
        }

        .form-label {
            position: absolute;
            top: 14px;
            left: 16px;
            font-size: 13px;
            color: rgba(255,255,255,0.6);
            pointer-events: none;
            transition: 0.3s ease;
        }

        .form-control:focus + .form-label,
        .form-control:not(:placeholder-shown) + .form-label {
            top: -8px;
            left: 12px;
            font-size: 11px;
            background: #243b55;
            padding: 2px 6px;
            border-radius: 6px;
            color: #42a5f5;
        }

        textarea.form-control {
            resize: vertical;
            min-height: 100px;
        }

        .helper-text {
            font-size: 12px;
            color: rgba(255,255,255,0.55);
            margin-top: 8px;
        }

        .save-btn {
            width: 100%;
            padding: 16px;
            border-radius: 14px;
            border: none;
            font-size: 15px;
            font-weight: 600;
            letter-spacing: 0.5px;
            background: linear-gradient(135deg, #42a5f5, #1e88e5);
            color: #ffffff;
            cursor: pointer;
            transition: 0.3s ease;
            box-shadow: 0 15px 35px rgba(66,165,245,0.35);
        }

        .save-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 20px 45px rgba(66,165,245,0.5);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(25px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 600px) {
            .category-card {
                padding: 35px 25px;
            }
        }
    </style>
</head>
<body>

<div class="category-card">

    <h2 class="category-title">
        ➕ Add Equipment Category
    </h2>

    <form method="POST">

        <div class="form-group">
            <input type="text" name="name" class="form-control" placeholder="Category Name" required>
            <label class="form-label">Category Name</label>
        </div>

        <div class="form-group">
            <input type="text" name="prefix" class="form-control" placeholder="Prefix (WC, WB, OX)" required>
            <label class="form-label">Prefix (Example: WC, WB, OX)</label>
            <div class="helper-text">
                This prefix will generate codes like WC001, WB010, etc.
            </div>
        </div>

        <div class="form-group">
            <textarea name="description" class="form-control" placeholder="Description"></textarea>
            <label class="form-label">Description</label>
        </div>

        <button type="submit" class="save-btn">
            💾 Save Category
        </button>

    </form>

</div>

</body>
</html>
