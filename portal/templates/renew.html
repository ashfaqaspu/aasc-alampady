<!DOCTYPE html>
<html>
<head>
    <title>Renew Membership | AASC</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
            padding: 50px 20px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .box {
            background: white;
            padding: 40px 35px;
            max-width: 480px;
            width: 100%;
            border-radius: 22px;
            box-shadow: 0 30px 80px rgba(0,0,0,0.25);
        }

        h2 {
            text-align: center;
            margin-bottom: 25px;
            color: #1565c0;
            font-weight: 700;
        }

        label {
            font-weight: 600;
            font-size: 13px;
            margin-bottom: 6px;
            display: block;
        }

        input[type="number"],
        input[type="file"] {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            border: 1px solid #d0d7de;
            margin-bottom: 18px;
        }

        input:focus {
            outline: none;
            border-color: #1565c0;
            box-shadow: 0 0 0 3px rgba(21,101,192,0.15);
        }

        /* UPI Button */
        .upi-btn {
            width: 100%;
            padding: 14px;
            border-radius: 12px;
            border: none;
            font-weight: 600;
            cursor: pointer;
            color: white;
            background: linear-gradient(135deg,#2e7d32,#43a047);
            box-shadow: 0 12px 25px rgba(46,125,50,0.35);
            transition: 0.3s ease;
            margin-bottom: 15px;
        }

        .upi-btn:hover {
            transform: translateY(-3px);
        }

        /* QR SECTION */
        .qr-section {
            text-align: center;
            background: #f5f8ff;
            padding: 20px;
            border-radius: 16px;
            margin-bottom: 20px;
        }

        .qr-section h4 {
            margin-bottom: 12px;
            color: #37474f;
            font-size: 14px;
            font-weight: 600;
        }

        .qr-image {
            width: 200px;
            height: 200px;
            object-fit: contain;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
        }

        .submit-btn {
            width: 100%;
            padding: 14px;
            border-radius: 12px;
            border: none;
            font-weight: 600;
            cursor: pointer;
            color: white;
            background: linear-gradient(135deg,#1e88e5,#42a5f5);
            box-shadow: 0 12px 25px rgba(30,136,229,0.35);
        }

        .submit-btn:hover {
            transform: translateY(-3px);
        }

        .back {
            display: block;
            text-align: center;
            margin-top: 20px;
            font-weight: 600;
            text-decoration: none;
            color: #1565c0;
        }
    </style>

    <!-- 🔥 ORIGINAL JS (UNCHANGED) -->
    <script>
        function openUPI() {
            const amount = document.getElementById("amount").value;
            if (!amount || amount <= 0) {
                alert("Please enter a valid amount");
                return;
            }

            const upiId = "7012538103@upi";
            const name = "AASC ALAMPADY";

            const url =
                `upi://pay?pa=${upiId}&pn=${encodeURIComponent(name)}&am=${amount}&cu=INR`;

            window.location.href = url;
        }
    </script>

</head>

<body>

<div class="box">

    <h2>💳 Renew Membership</h2>

    <label>Enter Amount (₹)</label>
    <input type="number"
           id="amount"
           name="amount"
           placeholder="Enter amount"
           required>

    <button type="button"
            class="upi-btn"
            onclick="openUPI()">
        📱 Pay via UPI App
    </button>

    <!-- 🔥 STATIC QR SECTION -->
    <div class="qr-section">
        <h4>OR Scan & Pay Using Another Phone</h4>

        <img src="{{ url_for('static', filename='aasc_qr.jpeg') }}"
             alt="AASC UPI QR Code"
             class="qr-image">
    </div>

    <form method="POST"
          enctype="multipart/form-data"
          action="{{ url_for('portal.renew') }}">

        <input type="hidden"
               name="amount"
               id="amount_hidden">

        <label>Upload Payment Screenshot</label>
        <input type="file"
               name="screenshot"
               accept="image/*"
               required>

        <button type="submit" class="submit-btn">
            ✅ Submit Renewal Request
        </button>

    </form>

    <a href="{{ url_for('portal.dashboard') }}"
       class="back">
       ← Back to Dashboard
    </a>

</div>

<script>
    document.querySelector("form").addEventListener("submit", function () {
        document.getElementById("amount_hidden").value =
            document.getElementById("amount").value;
    });
</script>

</body>
</html>
