<!DOCTYPE html>
<html>
<head>
    <title>My Committees</title>

    <!-- Premium Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>

    * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
    }

    body {
        font-family: 'Poppins', sans-serif;
        background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
        padding: 60px 20px;
        color: #2c3e50;
    }

    /* Main Card Container */
    .committee-container {
        max-width: 1100px;
        margin: auto;
        background: rgba(255,255,255,0.97);
        padding: 45px;
        border-radius: 28px;
        box-shadow: 0 30px 80px rgba(0,0,0,0.25);
    }

    /* Title */
    .committee-title {
        text-align: center;
        font-size: 34px;
        font-weight: 700;
        margin-bottom: 45px;
        background: linear-gradient(135deg,#1565c0,#00bcd4);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
    }

    /* Grid Layout */
    .committee-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
        gap: 30px;
    }

    /* Committee Card */
    .committee-card {
        background: linear-gradient(135deg,#f8fbff,#eef3ff);
        padding: 30px;
        border-radius: 20px;
        text-decoration: none;
        color: #2c3e50;
        font-weight: 600;
        font-size: 18px;
        box-shadow: 0 15px 35px rgba(0,0,0,0.08);
        transition: all 0.3s ease;
        position: relative;
        overflow: hidden;
    }

    .committee-card::before {
        content: "";
        position: absolute;
        top: 0;
        left: -100%;
        width: 100%;
        height: 100%;
        background: linear-gradient(120deg,transparent,rgba(255,255,255,0.4),transparent);
        transition: 0.6s;
    }

    .committee-card:hover::before {
        left: 100%;
    }

    .committee-card:hover {
        transform: translateY(-10px);
        background: linear-gradient(135deg,#1a237e,#3949ab);
        color: white;
        box-shadow: 0 25px 50px rgba(0,0,0,0.2);
    }

    .committee-name {
        font-size: 20px;
        font-weight: 600;
        z-index: 2;
        position: relative;
    }

    /* Empty State */
    .empty-state {
        text-align: center;
        padding: 60px;
        background: #f5f8ff;
        border-radius: 20px;
        font-size: 18px;
        color: #78909c;
        box-shadow: inset 0 0 20px rgba(0,0,0,0.05);
    }

    /* Back Button */
    .back-wrapper {
        text-align: center;
        margin-top: 50px;
    }

    .back-btn {
        display: inline-block;
        padding: 14px 32px;
        border-radius: 40px;
        background: linear-gradient(135deg,#1e88e5,#42a5f5);
        color: white;
        text-decoration: none;
        font-weight: 600;
        transition: 0.3s ease;
        box-shadow: 0 10px 25px rgba(30,136,229,0.35);
    }

    .back-btn:hover {
        transform: translateY(-4px);
        box-shadow: 0 20px 40px rgba(30,136,229,0.5);
    }

    /* Responsive */
    @media (max-width: 768px) {

        .committee-container {
            padding: 30px;
        }

        .committee-title {
            font-size: 26px;
        }

        .committee-card {
            padding: 22px;
            font-size: 16px;
        }

    }

    </style>
</head>

<body>

<div class="committee-container">

    <div class="committee-title">📂 My Committees</div>

    {% if committees %}
        <div class="committee-grid">
            {% for c in committees %}
                <a href="{{ url_for('portal.committee_dashboard',
                                    cid=c.id) }}"
                   class="committee-card">

                    <div class="committee-name">
                        {{ c.name }}
                    </div>

                </a>
            {% endfor %}
        </div>
    {% else %}
        <div class="empty-state">
            You are not part of any committee yet.
        </div>
    {% endif %}

    <div class="back-wrapper">
        <a href="{{ url_for('portal.dashboard') }}"
           class="back-btn">
           ← Back to Dashboard
        </a>
    </div>

</div>

</body>
</html>
