<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Admin | Manage Admins</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
* {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
    font-family: 'Inter', sans-serif;
}

body {
    background: linear-gradient(135deg, #0f172a, #1e293b);
    min-height: 100vh;
    padding: 60px 20px;
    color: #e2e8f0;
}

/* Page Title */
.page-title {
    text-align: center;
    font-size: 30px;
    font-weight: 700;
    margin-bottom: 45px;
    letter-spacing: 0.5px;
}

/* Card */
.card {
    background: #1e293b;
    padding: 35px;
    border-radius: 24px;
    border: 1px solid #334155;
    box-shadow: 0 30px 70px rgba(0,0,0,0.5);
    margin-bottom: 35px;
    max-width: 900px;
    margin-left: auto;
    margin-right: auto;
}

.card h3 {
    margin-bottom: 20px;
    font-size: 18px;
    font-weight: 600;
}

/* Table */
table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 10px;
}

thead {
    background: linear-gradient(135deg,#6366f1,#4338ca);
}

th {
    padding: 16px 18px;
    text-align: left;
    font-size: 14px;
    font-weight: 600;
    color: white;
}

td {
    padding: 16px 18px;
    border-bottom: 1px solid #334155;
    font-size: 14px;
}

tbody tr {
    transition: 0.25s ease;
}

tbody tr:hover {
    background: #0f172a;
}

tr:last-child td {
    border-bottom: none;
}

/* Form */
input {
    width: 100%;
    padding: 14px 16px;
    margin-top: 15px;
    border-radius: 14px;
    border: 1px solid #334155;
    background: #0f172a;
    color: #e2e8f0;
    font-size: 14px;
    transition: 0.3s ease;
}

input:focus {
    outline: none;
    border-color: #6366f1;
    box-shadow: 0 0 0 3px rgba(99,102,241,0.25);
}

/* Primary Button */
button {
    margin-top: 20px;
    padding: 14px 26px;
    border-radius: 16px;
    border: none;
    font-weight: 600;
    font-size: 15px;
    background: linear-gradient(135deg,#6366f1,#4338ca);
    color: white;
    cursor: pointer;
    transition: 0.3s ease;
    box-shadow: 0 18px 45px rgba(67,56,202,0.4);
}

button:hover {
    transform: translateY(-3px);
    box-shadow: 0 28px 60px rgba(67,56,202,0.6);
}

/* Back Button */
.back {
    display: inline-block;
    margin-top: 30px;
    padding: 12px 22px;
    border-radius: 14px;
    text-decoration: none;
    font-weight: 600;
    background: #334155;
    color: #e2e8f0;
    transition: 0.3s ease;
}

.back:hover {
    background: #475569;
    transform: translateY(-3px);
}

.back-container {
    text-align: center;
}

/* Responsive */
@media (max-width: 768px) {
    th, td {
        padding: 12px;
        font-size: 13px;
    }
}
</style>
</head>

<body>

<div class="page-title">
    🔐 Manage Admins
</div>

<!-- Current Admins -->
<div class="card">
    <h3>Current Admins</h3>

    <table>
        <thead>
            <tr>
                <th>Name</th>
                <th>Phone</th>
            </tr>
        </thead>
        <tbody>
            {% for a in admins %}
            <tr>
                <td>{{ a.name }}</td>
                <td>{{ a.phone }}</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>

<!-- Add Admin -->
<div class="card">
    <h3>Make Member an Admin</h3>

    <form method="POST">
        <input name="phone"
               placeholder="Member Phone Number"
               required>

        <input type="hidden"
               name="action"
               value="add">

        <button type="submit">Add Admin</button>
    </form>
</div>

<div class="back-container">
    <a href="{{ url_for('portal.dashboard') }}" class="back">
        ← Back to Dashboard
    </a>
</div>

</body>
</html>
