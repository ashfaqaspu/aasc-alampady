<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>My Committees</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
* {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
    font-family: 'Inter', sans-serif;
}

body {
    background: linear-gradient(135deg, #0f172a, #1e293b);
    min-height: 100vh;
    padding: 60px 20px;
    color: #e2e8f0;
}

/* Title */
h2 {
    text-align: center;
    font-size: 30px;
    font-weight: 700;
    margin-bottom: 40px;
    letter-spacing: 0.5px;
}

/* Grid Container */
.committees {
    max-width: 900px;
    margin: auto;
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
    gap: 24px;
}

/* Committee Card */
.committee-card {
    background: #1e293b;
    padding: 30px 20px;
    border-radius: 24px;
    border: 1px solid #334155;
    box-shadow: 0 25px 60px rgba(0,0,0,0.4);
    text-align: center;
    transition: 0.3s ease;
}

.committee-card:hover {
    transform: translateY(-6px);
    box-shadow: 0 35px 80px rgba(0,0,0,0.6);
}

/* Committee Link */
.committee-card a {
    text-decoration: none;
    font-weight: 600;
    font-size: 16px;
    color: #6366f1;
    transition: 0.3s;
}

.committee-card a:hover {
    color: #818cf8;
}

/* Empty State */
.empty {
    max-width: 600px;
    margin: auto;
    background: #1e293b;
    padding: 40px;
    border-radius: 24px;
    border: 1px solid #334155;
    box-shadow: 0 25px 60px rgba(0,0,0,0.4);
    text-align: center;
    font-size: 15px;
    color: #94a3b8;
}

/* Back Button */
.back {
    display: inline-block;
    margin-top: 40px;
    padding: 12px 24px;
    border-radius: 16px;
    background: #334155;
    color: #e2e8f0;
    text-decoration: none;
    font-weight: 600;
    transition: 0.3s;
}

.back:hover {
    background: #475569;
    transform: translateY(-3px);
}

/* Center Back */
.back-container {
    text-align: center;
}
</style>
</head>

<body>

<h2>🏛 My Committees</h2>

{% if committees %}
  <div class="committees">
  {% for c in committees %}
    <div class="committee-card">
      <a href="{{ url_for('portal.committee_dashboard', cid=c[0]) }}">
        {{ c[1] }}
      </a>
    </div>
  {% endfor %}
  </div>
{% else %}
  <div class="empty">
    🚫 You are not part of any committee.
  </div>
{% endif %}

<div class="back-container">
  <a href="{{ url_for('portal.dashboard') }}" class="back">
      ← Back to Dashboard
  </a>
</div>

</body>
</html>
