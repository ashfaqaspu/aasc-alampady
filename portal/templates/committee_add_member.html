<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Add Committee Member</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
* {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
    font-family: 'Inter', sans-serif;
}

body {
    background: linear-gradient(135deg, #0f172a, #1e293b);
    min-height: 100vh;
    padding: 60px 20px;
    color: #e2e8f0;
    display: flex;
    flex-direction: column;
    align-items: center;
}

/* Title */
h2 {
    font-size: 28px;
    font-weight: 700;
    margin-bottom: 35px;
    letter-spacing: 0.5px;
}

/* Card */
.card {
    width: 100%;
    max-width: 480px;
    background: #1e293b;
    padding: 35px;
    border-radius: 24px;
    border: 1px solid #334155;
    box-shadow: 0 30px 70px rgba(0,0,0,0.5);
}

/* Labels */
label {
    font-size: 13px;
    font-weight: 600;
    color: #94a3b8;
    display: block;
    margin-bottom: 8px;
}

/* Select */
select {
    width: 100%;
    padding: 14px 16px;
    border-radius: 14px;
    border: 1px solid #334155;
    background: #0f172a;
    color: #e2e8f0;
    font-size: 14px;
    margin-bottom: 20px;
    transition: 0.3s;
}

select:focus {
    outline: none;
    border-color: #6366f1;
    box-shadow: 0 0 0 3px rgba(99,102,241,0.25);
}

/* Button */
button {
    width: 100%;
    padding: 14px;
    border-radius: 16px;
    border: none;
    font-weight: 600;
    font-size: 14px;
    cursor: pointer;
    background: linear-gradient(135deg,#6366f1,#4338ca);
    color: white;
    transition: 0.3s;
    box-shadow: 0 15px 40px rgba(67,56,202,0.4);
}

button:hover {
    transform: translateY(-3px);
    box-shadow: 0 25px 60px rgba(67,56,202,0.6);
}

/* Back Button */
.back {
    margin-top: 30px;
    padding: 12px 22px;
    border-radius: 14px;
    background: #334155;
    color: #e2e8f0;
    text-decoration: none;
    font-weight: 600;
    transition: 0.3s;
}

.back:hover {
    background: #475569;
    transform: translateY(-2px);
}

/* Responsive */
@media (max-width: 500px) {
    .card {
        padding: 25px;
    }
}
</style>
</head>

<body>

<h2>➕ Add Member to Committee</h2>

<div class="card">
    <form method="post">

        <label>Select Member</label>
        <select name="user_id" required>
            {% for u in users %}
                <option value="{{ u.id }}">
                    {{ u.name }} ({{ u.membership_id }})
                </option>
            {% endfor %}
        </select>

        <label>Select Role</label>
        <select name="role">
            <option value="member">Member</option>
            <option value="admin">Admin</option>
        </select>

        <button type="submit">
            Add to Committee
        </button>

    </form>
</div>

<a href="{{ url_for('portal.committee_members_page', cid=cid) }}" class="back">
    ← Back to Members
</a>

</body>
</html>
