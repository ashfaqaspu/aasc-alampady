<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Committee Members</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
* {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
    font-family: 'Inter', sans-serif;
}

body {
    background: linear-gradient(135deg, #0f172a, #1e293b);
    min-height: 100vh;
    padding: 60px 20px;
    color: #e2e8f0;
}

/* Page Title */
h2 {
    text-align: center;
    font-size: 30px;
    font-weight: 700;
    margin-bottom: 35px;
    letter-spacing: 0.5px;
}

/* Table Card */
.table-wrapper {
    max-width: 1000px;
    margin: auto;
    background: #1e293b;
    border-radius: 24px;
    border: 1px solid #334155;
    box-shadow: 0 30px 70px rgba(0,0,0,0.5);
    overflow: hidden;
}

/* Table */
table {
    width: 100%;
    border-collapse: collapse;
}

/* Header */
thead {
    background: linear-gradient(135deg,#6366f1,#4338ca);
}

th {
    padding: 16px;
    text-align: left;
    font-size: 13px;
    font-weight: 600;
    color: white;
}

td {
    padding: 16px;
    border-bottom: 1px solid #334155;
    font-size: 14px;
}

tbody tr {
    transition: 0.25s;
}

tbody tr:hover {
    background: #0f172a;
}

tr:last-child td {
    border-bottom: none;
}

/* Role Badge */
.role {
    display: inline-block;
    padding: 6px 14px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 600;
    text-transform: capitalize;
    background: rgba(99,102,241,0.15);
    color: #6366f1;
}

/* Remove Button */
.remove {
    display: inline-block;
    padding: 6px 12px;
    border-radius: 12px;
    font-size: 12px;
    font-weight: 600;
    text-decoration: none;
    background: #ef4444;
    color: white;
    transition: 0.3s;
}

.remove:hover {
    background: #dc2626;
    transform: translateY(-2px);
}

/* Self Indicator */
.self {
    color: #94a3b8;
    font-style: italic;
}

/* Back Button */
.back {
    display: inline-block;
    margin-top: 35px;
    padding: 12px 24px;
    border-radius: 14px;
    background: #334155;
    color: #e2e8f0;
    text-decoration: none;
    font-weight: 600;
    transition: 0.3s;
}

.back:hover {
    background: #475569;
    transform: translateY(-2px);
}

/* Responsive */
@media (max-width: 768px) {
    table, thead, tbody, th, td, tr {
        display: block;
    }

    thead {
        display: none;
    }

    tr {
        margin-bottom: 15px;
        border-bottom: 2px solid #334155;
    }

    td {
        padding: 10px;
    }

    td::before {
        content: attr(data-label);
        font-weight: 600;
        display: block;
        margin-bottom: 5px;
        color: #94a3b8;
        font-size: 12px;
    }
}
</style>
</head>

<body>

<h2>👥 Committee Members</h2>

<div class="table-wrapper">
<table>
<thead>
<tr>
  <th>Name</th>
  <th>Phone</th>
  <th>Role</th>
  <th>Action</th>
</tr>
</thead>

<tbody>
{% for m in members %}
<tr>
  <td>{{ m[1] }}</td>
  <td>{{ m[2] }}</td>
  <td><span class="role">{{ m[3] }}</span></td>
  <td>
    {% if m[0] != session['user_id'] %}
      <a class="remove"
         href="{{ url_for('portal.remove_committee_member', cid=cid, uid=m[0]) }}"
         onclick="return confirm('Remove this member from committee?')">
         ❌ Remove
      </a>
    {% else %}
      <span class="self">—</span>
    {% endif %}
  </td>
</tr>
{% endfor %}
</tbody>
</table>
</div>

<a href="{{ url_for('portal.committee_dashboard', cid=cid) }}"
   class="back">
   ← Back to Committee
</a>

</body>
</html>
