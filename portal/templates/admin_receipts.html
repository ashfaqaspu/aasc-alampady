<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Receipts</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
* {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
    font-family: 'Inter', sans-serif;
}

body {
    background: linear-gradient(135deg, #0f172a, #1e293b);
    min-height: 100vh;
    padding: 60px 20px;
    color: #e2e8f0;
}

/* Page Title */
.page-title {
    text-align: center;
    font-size: 30px;
    font-weight: 700;
    margin-bottom: 40px;
    letter-spacing: 0.5px;
}

/* Table Card */
.table-wrapper {
    max-width: 1100px;
    margin: auto;
    background: #1e293b;
    border-radius: 24px;
    border: 1px solid #334155;
    box-shadow: 0 30px 70px rgba(0,0,0,0.5);
    overflow: hidden;
}

/* Table */
table {
    width: 100%;
    border-collapse: collapse;
}

/* Header */
thead {
    background: linear-gradient(135deg, #22c55e, #16a34a);
}

th {
    padding: 16px 20px;
    text-align: left;
    font-size: 14px;
    font-weight: 600;
    color: white;
    letter-spacing: 0.3px;
}

/* Body */
td {
    padding: 16px 20px;
    border-bottom: 1px solid #334155;
    font-size: 14px;
}

tbody tr {
    transition: 0.25s ease;
}

tbody tr:hover {
    background: #0f172a;
}

tr:last-child td {
    border-bottom: none;
}

/* Amount Highlight */
.amount {
    font-weight: 700;
    color: #22c55e;
}

/* Print Friendly */
@media print {
    body {
        background: white;
        color: black;
        padding: 0;
    }

    .table-wrapper {
        box-shadow: none;
        border-radius: 0;
        border: none;
    }

    th {
        background: #ddd !important;
        color: black !important;
    }
}
</style>
</head>

<body>

<div class="page-title">
    🧾 Receipts
</div>

<div class="table-wrapper">
    <table>
        <thead>
            <tr>
                <th>Receipt No</th>
                <th>Name</th>
                <th>Membership ID</th>
                <th>Amount</th>
                <th>Date</th>
            </tr>
        </thead>

        <tbody>
        {% for receipt, user in receipts %}
        <tr>
            <td>{{ receipt.receipt_no }}</td>
            <td>{{ user.name }}</td>
            <td>{{ user.membership_id }}</td>
            <td class="amount">₹{{ receipt.amount }}</td>
            <td>{{ receipt.issued_date }}</td>
        </tr>
        {% endfor %}
        </tbody>
    </table>
</div>

</body>
</html>
