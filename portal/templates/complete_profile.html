<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Complete Profile | AASC ALAMPADY</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
* {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
    font-family: 'Inter', sans-serif;
}

body {
    min-height: 100vh;
    background: linear-gradient(135deg, #0f172a, #1e293b);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 50px 20px;
    color: #e2e8f0;
}

.card {
    width: 100%;
    max-width: 620px;
    background: #1e293b;
    border-radius: 28px;
    padding: 40px 35px;
    border: 1px solid #334155;
    box-shadow: 0 40px 90px rgba(0,0,0,0.6);
}

h2 {
    text-align: center;
    font-size: 30px;
    font-weight: 700;
    margin-bottom: 6px;
}

.subtitle {
    text-align: center;
    font-size: 14px;
    color: #94a3b8;
    margin-bottom: 30px;
}

.section-title {
    font-size: 16px;
    font-weight: 600;
    margin-bottom: 15px;
    margin-top: 25px;
    color: #6366f1;
}

label {
    display: block;
    font-size: 13px;
    font-weight: 600;
    margin-bottom: 6px;
    color: #94a3b8;
}

input, textarea, select {
    width: 100%;
    padding: 14px 16px;
    border-radius: 16px;
    border: 1px solid #334155;
    background: #0f172a;
    color: #e2e8f0;
    margin-bottom: 18px;
    font-size: 14px;
    transition: 0.3s;
}

input:focus, textarea:focus, select:focus {
    outline: none;
    border-color: #6366f1;
    box-shadow: 0 0 0 3px rgba(99,102,241,0.25);
}

textarea {
    resize: vertical;
}

.photo-preview {
    display: flex;
    justify-content: center;
    margin-bottom: 20px;
}

.photo-preview img {
    width: 120px;
    height: 120px;
    border-radius: 50%;
    object-fit: cover;
    border: 4px solid #6366f1;
    box-shadow: 0 20px 40px rgba(0,0,0,0.5);
}

.checkbox-group {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(140px,1fr));
    gap: 12px;
    margin-bottom: 25px;
}

.checkbox-group label {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px 14px;
    border-radius: 16px;
    background: #0f172a;
    border: 1px solid #334155;
    cursor: pointer;
}

.checkbox-group input {
    width: auto;
    margin: 0;
}

button {
    width: 100%;
    padding: 16px;
    border-radius: 18px;
    border: none;
    font-size: 15px;
    font-weight: 600;
    background: linear-gradient(135deg,#6366f1,#4338ca);
    color: white;
    cursor: pointer;
    box-shadow: 0 20px 50px rgba(67,56,202,0.5);
    transition: 0.3s;
}

button:hover {
    transform: translateY(-3px);
}

.back-btn {
    display: block;
    margin-top: 25px;
    text-align: center;
    font-weight: 600;
    text-decoration: none;
    color: #94a3b8;
}

.back-btn:hover {
    color: #ffffff;
}
</style>
</head>

<body>

<div class="card">

<h2>Complete Your Profile</h2>
<div class="subtitle">This is required only once</div>

<form method="POST"
      enctype="multipart/form-data"
      action="{{ url_for('portal.complete_profile') }}">

<!-- PHOTO -->
<div class="photo-ring-wrap">
    <div class="photo-ring-outer"></div>
    <div class="photo-ring-mid"></div>

    {% if user.photo %}
        <img src="{{ user.photo }}" 
             alt="{{ user.name }}" 
             class="id-photo">
    {% else %}
        <img src="{{ url_for('static', filename='default_avatar.png') }}" 
             alt="Default Avatar" 
             class="id-photo">
    {% endif %}

</div>

<label>Upload Profile Photo (Optional)</label>
<input type="file" name="photo" accept="image/*">

<div class="section-title">Additional Information</div>

<label>Address</label>
<textarea name="address" rows="3">{{ user.address or "" }}</textarea>

<label>Email</label>
<input type="email" name="email" value="{{ user.email or '' }}">

<label>WhatsApp Number</label>
<input type="text" name="whatsapp" value="{{ user.whatsapp or '' }}">

<label>Date of Birth</label>
<input type="date" name="dob"
value="{{ user.dob.strftime('%Y-%m-%d') if user.dob else '' }}">

<label>Blood Group</label>
<select name="blood_group">
<option value="">Select Blood Group</option>
<option value="A+" {% if user.blood_group=="A+" %}selected{% endif %}>A+</option>
<option value="A-" {% if user.blood_group=="A-" %}selected{% endif %}>A-</option>
<option value="B+" {% if user.blood_group=="B+" %}selected{% endif %}>B+</option>
<option value="B-" {% if user.blood_group=="B-" %}selected{% endif %}>B-</option>
<option value="O+" {% if user.blood_group=="O+" %}selected{% endif %}>O+</option>
<option value="O-" {% if user.blood_group=="O-" %}selected{% endif %}>O-</option>
<option value="AB+" {% if user.blood_group=="AB+" %}selected{% endif %}>AB+</option>
<option value="AB-" {% if user.blood_group=="AB-" %}selected{% endif %}>AB-</option>
</select>

<label>Interested Fields</label>

{% set selected_interests = user.interests.split(',') if user.interests else [] %}

<div class="checkbox-group">

<label>
<input type="checkbox" name="interests" value="Arts"
{% if "Arts" in selected_interests %}checked{% endif %}> Arts
</label>

<label>
<input type="checkbox" name="interests" value="Sports"
{% if "Sports" in selected_interests %}checked{% endif %}> Sports
</label>

<label>
<input type="checkbox" name="interests" value="Literature"
{% if "Literature" in selected_interests %}checked{% endif %}> Literature
</label>

<label>
<input type="checkbox" name="interests" value="Tech"
{% if "Tech" in selected_interests %}checked{% endif %}> Tech
</label>

</div>

<button type="submit">Save & Continue</button>

<a href="{{ url_for('portal.dashboard') }}" class="back-btn">
← Back to Portal Dashboard
</a>

</form>

</div>

</body>
</html>
