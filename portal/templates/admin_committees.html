<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>All Committees</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
  font-family: 'Inter', sans-serif;
}

body {
  background: linear-gradient(135deg, #0f172a, #1e293b);
  min-height: 100vh;
  padding: 60px 20px;
  color: #f1f5f9;
}

/* Wrapper */
.page-wrapper {
  max-width: 1150px;
  margin: auto;
}

/* Title */
.page-title {
  font-size: 30px;
  font-weight: 700;
  margin-bottom: 40px;
  text-align: center;
  letter-spacing: 0.5px;
}

/* Card */
.table-card {
  background: #1e293b;
  border-radius: 24px;
  box-shadow: 0 30px 70px rgba(0,0,0,0.5);
  border: 1px solid #334155;
  overflow: hidden;
}

/* Table */
table {
  width: 100%;
  border-collapse: collapse;
}

thead {
  background: #0f172a;
}

th {
  padding: 18px 20px;
  text-align: left;
  font-size: 13px;
  letter-spacing: 0.5px;
  color: #94a3b8;
}

td {
  padding: 18px 20px;
  border-bottom: 1px solid #334155;
  font-size: 14px;
}

tbody tr:last-child td {
  border-bottom: none;
}

tbody tr:hover td {
  background: #273449;
}

/* Badge */
.badge {
  background: rgba(59,130,246,0.15);
  color: #3b82f6;
  padding: 6px 12px;
  border-radius: 20px;
  font-size: 12px;
  font-weight: 600;
}

/* Actions */
.actions a {
  text-decoration: none;
  font-size: 13px;
  font-weight: 600;
  margin-right: 10px;
  padding: 8px 14px;
  border-radius: 12px;
  transition: 0.3s ease;
  display: inline-block;
}

/* View Button */
.view-btn {
  background: linear-gradient(135deg, #3b82f6, #2563eb);
  color: white;
  box-shadow: 0 12px 25px rgba(37,99,235,0.4);
}

.view-btn:hover {
  transform: translateY(-2px);
  box-shadow: 0 18px 35px rgba(37,99,235,0.6);
}

/* Delete Button */
.delete-btn {
  background: rgba(239,68,68,0.15);
  color: #ef4444;
}

.delete-btn:hover {
  background: #ef4444;
  color: white;
}

/* Empty State */
.empty-state {
  text-align: center;
  padding: 70px 20px;
  color: #94a3b8;
  font-size: 15px;
}

/* Responsive */
@media (max-width: 768px) {

  table, thead, tbody, th, td, tr {
    display: block;
  }

  thead {
    display: none;
  }

  tr {
    margin-bottom: 20px;
    border-bottom: 1px solid #334155;
  }

  td {
    padding: 12px 15px;
  }

  td::before {
    content: attr(data-label);
    font-weight: 600;
    display: block;
    margin-bottom: 6px;
    color: #94a3b8;
  }

  .actions a {
    margin-bottom: 8px;
  }
}
</style>
</head>

<body>

<div class="page-wrapper">

<div class="page-title">
  🏛 All Committees
</div>

{% if committees and committees|length > 0 %}

<div class="table-card">
<table>
  <thead>
    <tr>
      <th>ID</th>
      <th>Committee Name</th>
      <th>Total Members</th>
      <th>Actions</th>
    </tr>
  </thead>

  <tbody>
    {% for c in committees %}
    <tr>
      <td data-label="ID">{{ c.id }}</td>
      <td data-label="Committee Name">{{ c.name }}</td>
      <td data-label="Members">
        <span class="badge">{{ c.members|length }} Members</span>
      </td>
      <td data-label="Actions" class="actions">
        <a href="{{ url_for('portal.committee_dashboard', cid=c.id) }}"
           class="view-btn">
           👁 View
        </a>

        <a href="{{ url_for('portal.delete_committee', cid=c.id) }}"
           class="delete-btn"
           onclick="return confirm('Are you sure you want to delete this committee?');">
           🗑 Delete
        </a>
      </td>
    </tr>
    {% endfor %}
  </tbody>
</table>
</div>

{% else %}

<div class="empty-state">
  🚫 No committees found.<br><br>
  Create a committee to get started.
</div>

{% endif %}

</div>

</body>
</html>
