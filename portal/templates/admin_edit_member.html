<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Edit Member</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
* {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
    font-family: 'Inter', sans-serif;
}

body {
    min-height: 100vh;
    padding: 60px 20px;
    background: linear-gradient(135deg, #0f172a, #1e293b);
    display: flex;
    align-items: center;
    justify-content: center;
    color: #f1f5f9;
}

/* Card */
.card {
    width: 100%;
    max-width: 460px;
    background: #1e293b;
    padding: 40px;
    border-radius: 24px;
    border: 1px solid #334155;
    box-shadow: 0 30px 70px rgba(0,0,0,0.5);
    animation: fadeIn 0.4s ease;
}

@keyframes fadeIn {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
}

h3 {
    text-align: center;
    font-size: 22px;
    margin-bottom: 30px;
    font-weight: 600;
    letter-spacing: 0.4px;
}

/* Inputs */
input {
    width: 100%;
    padding: 14px 16px;
    margin-bottom: 18px;
    font-size: 14px;
    border-radius: 14px;
    border: 1px solid #334155;
    background: #0f172a;
    color: #f1f5f9;
    transition: 0.3s ease;
}

input:focus {
    outline: none;
    border-color: #6366f1;
    box-shadow: 0 0 0 3px rgba(99,102,241,0.25);
}

/* Update Button */
button {
    width: 100%;
    padding: 14px;
    border-radius: 16px;
    border: none;
    font-size: 15px;
    font-weight: 600;
    background: linear-gradient(135deg, #6366f1, #4338ca);
    color: white;
    cursor: pointer;
    transition: 0.3s ease;
    box-shadow: 0 18px 40px rgba(67,56,202,0.4);
}

button:hover {
    transform: translateY(-3px);
    box-shadow: 0 28px 60px rgba(67,56,202,0.6);
}

button:active {
    transform: scale(0.98);
}

/* Back Link */
a {
    display: block;
    margin-top: 25px;
    text-align: center;
    text-decoration: none;
    font-weight: 500;
    font-size: 14px;
    color: #94a3b8;
    transition: 0.3s ease;
}

a:hover {
    color: #f1f5f9;
    transform: translateY(-2px);
}
</style>
</head>

<body>

<div class="card">
    <h3>✏ Edit Member</h3>

    <form method="POST">

        <input
            type="text"
            name="name"
            value="{{ member.name }}"
            placeholder="Name"
            required>

        <input
            type="text"
            name="phone"
            value="{{ member.phone }}"
            placeholder="Phone"
            required>

        <input
            type="text"
            name="nativity"
            value="{{ member.nativity }}"
            placeholder="Nativity"
            required>

        <button type="submit">Update Member</button>

    </form>

    <a href="{{ url_for('portal.admin_members') }}">← Back</a>
</div>

</body>
</html>
